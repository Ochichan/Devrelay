name: Fuzz

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: read

jobs:
  corpus-smoke:
    name: Corpus smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check fuzz crate
        run: cargo +nightly check --manifest-path fuzz/Cargo.toml

      - name: Run committed corpus smoke
        shell: bash
        run: |
          set -euo pipefail
          targets=(
            manifest_parser
            porcelain_parser
            path_canonicalization
            cas_manifest
            network_api_payload
          )
          for target in "${targets[@]}"; do
            cargo +nightly run --manifest-path fuzz/Cargo.toml --bin "$target" -- -runs=1 "fuzz/corpus/$target"
          done

  nightly-fuzz:
    name: Nightly fuzz (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: corpus-smoke
    strategy:
      fail-fast: false
      matrix:
        target:
          - manifest_parser
          - porcelain_parser
          - path_canonicalization
          - cas_manifest
          - network_api_payload

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Run fuzz target
        run: cargo +nightly fuzz run "${{ matrix.target }}" "fuzz/corpus/${{ matrix.target }}" -- -max_total_time=60

      - name: Upload fuzz artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-artifacts-${{ matrix.target }}
          path: fuzz/artifacts/${{ matrix.target }}/
          if-no-files-found: ignore
